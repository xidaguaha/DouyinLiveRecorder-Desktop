<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音直播录制工具(整合版)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #475569;
    }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-dark); min-height: 100vh; color: var(--text-primary); overflow: hidden; }
    .app-container { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: var(--bg-card); padding: 20px 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .app-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .app-logo h1 { font-size: 18px; font-weight: 600; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .app-logo p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .nav-menu { flex: 1; }
    .nav-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 12px; }
    .nav-item:hover { background: rgba(102, 126, 234, 0.1); }
    .nav-item.active { background: rgba(102, 126, 234, 0.15); border-left-color: var(--primary); color: var(--primary); }
    .nav-icon { font-size: 18px; }
    .nav-label { font-size: 14px; font-weight: 500; }
    .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
    .switch-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    .switch-label { font-size: 13px; color: var(--text-secondary); }
    .switch { width: 40px; height: 22px; background: var(--bg-input); border-radius: 11px; position: relative; cursor: pointer; transition: background 0.2s; }
    .switch.active { background: var(--primary); }
    .switch::before { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
    .switch.active::before { left: 20px; }
    .main-content { flex: 1; overflow-y: auto; padding: 30px; background: var(--bg-dark); }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { margin-bottom: 30px; }
    .page-title { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .page-subtitle { font-size: 14px; color: var(--text-secondary); }
    .status-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .status-card { background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
    .status-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .status-card-title { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .status-indicator { width: 10px; height: 10px; border-radius: 50%; }
    .status-indicator.active { background: var(--success); animation: pulse 2s infinite; }
    .status-indicator.inactive { background: var(--danger); animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status-card-value { font-size: 32px; font-weight: 700; color: var(--text-primary); }
    .status-card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .control-panel { background: var(--bg-card); border-radius: 12px; padding: 24px; margin-bottom: 30px; border: 1px solid var(--border); }
    .control-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .control-panel-title { font-size: 16px; font-weight: 600; }
    .control-buttons { display: flex; gap: 12px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4); }
    .btn-secondary { background: var(--bg-input); color: var(--text-primary); }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .list-card { background: var(--bg-card); border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
    .list-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .list-card-title { font-size: 16px; font-weight: 600; }
    .list-count { background: var(--primary); color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .room-list { max-height: 400px; overflow-y: auto; }
    .room-item { display: flex; align-items: center; padding: 16px; background: var(--bg-input); border-radius: 8px; margin-bottom: 8px; transition: all 0.2s; }
    .room-item:hover { background: var(--border); }
    .room-status { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; }
    .room-status.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .room-status.offline { background: var(--text-secondary); }
    .room-info { flex: 1; }
    .room-name { font-weight: 500; margin-bottom: 4px; }
    .room-url { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-actions { display: flex; gap: 8px; }
    .icon-btn { width: 32px; height: 32px; border: none; background: var(--bg-card); color: var(--text-secondary); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .icon-btn:hover { background: var(--primary); color: white; }
    .icon-btn.danger:hover { background: var(--danger); }
    .input-group { display: flex; gap: 12px; margin-top: 16px; }
    .input-field { flex: 1; padding: 12px 16px; background: var(--bg-input); border: 2px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; transition: border-color 0.2s; }
    .input-field:focus { outline: none; border-color: var(--primary); }
    .input-field::placeholder { color: var(--text-secondary); }
    .log-container { background: #0d0d0d; border-radius: 8px; padding: 0; border: 1px solid #2a2a2a; height: calc(100vh - 280px); display: flex; flex-direction: column; overflow: hidden; }
    .log-header { background: #1a1a1a; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
    .log-title { font-size: 13px; font-weight: 600; color: #ccc; }
    .log-content { flex: 1; overflow-y: auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; line-height: 1.5; color: #fff; background: #000; padding: 10px 14px; white-space: pre-wrap; word-break: break-all; }
    .log-entry { margin-bottom: 2px; padding: 2px 4px; }
    .log-entry:hover { background: rgba(255,255,255,0.05); }
    .log-timestamp { color: #888; margin-right: 12px; font-size: 12px; }
    .log-message { color: #e0e0e0; }
    .log-message.success { color: #4caf50; }
    .log-message.error { color: #f44336; }
    .log-message.warning { color: #ff9800; }
    .settings-section { background: var(--bg-card); border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
    .settings-section-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; background: var(--bg-input); border: 2px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .switch-group { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .switch-group:last-child { border-bottom: none; }
    .switch-group-label { font-size: 14px; font-weight: 500; }
    .switch-group-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .save-btn { margin-top: 20px; padding: 14px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="app-logo"><h1>直播录制</h1><p>抖音 · TikTok · 多平台</p></div>
      <div class="nav-menu">
        <div class="nav-item active" onclick="showPage('monitor', this)"><span class="nav-icon">📹</span><span class="nav-label">监控中心</span></div>
        <div class="nav-item" onclick="showPage('settings', this)"><span class="nav-icon">⚙️</span><span class="nav-label">录制设置</span></div>
        <div class="nav-item" onclick="showPage('push', this)"><span class="nav-icon">📤</span><span class="nav-label">推送配置</span></div>
        <div class="nav-item" onclick="showPage('cookies', this)"><span class="nav-icon">🍪</span><span class="nav-label">Cookie管理</span></div>
      </div>
      <div class="sidebar-footer">
        <div class="switch-item"><span class="switch-label">开机自启</span><div class="switch" id="auto-start-switch" onclick="toggleAutoStart()"></div></div>
        <div class="switch-item"><span class="switch-label">启动时自动监控</span><div class="switch" id="auto-monitor-switch" onclick="toggleAutoMonitor()"></div></div>
        <div class="switch-item"><span class="switch-label">最小化到托盘</span><div class="switch active" id="minimize-to-tray-switch" onclick="toggleMinimizeToTray()"></div></div>
      </div>
    </div>
    <div class="main-content">
      <div id="page-monitor" class="page active">
        <div class="page-header"><h1 class="page-title">监控中心</h1><p class="page-subtitle">实时监控直播间状态，自动录制直播内容</p></div>
        <div class="status-cards">
          <div class="status-card"><div class="status-card-header"><span class="status-card-title">监控状态</span><div class="status-indicator" id="monitor-indicator"></div></div><div class="status-card-value" id="monitor-status">未监控</div><div class="status-card-sub">点击开始监控主播开播状态</div></div>
          <div class="status-card"><div class="status-card-header"><span class="status-card-title">监控房间</span><div class="status-indicator active"></div></div><div class="status-card-value" id="room-count">0</div><div class="status-card-sub">个房间</div></div>
          <div class="status-card"><div class="status-card-header"><span class="status-card-title">录制状态</span><div class="status-indicator inactive" id="record-indicator"></div></div><div class="status-card-value" id="record-status">等待开播</div><div class="status-card-sub">检测到开播自动录制</div></div>
        </div>
        <div class="control-panel">
          <div class="control-panel-header"><span class="control-panel-title">控制面板</span></div>
          <div class="control-buttons">
            <button class="btn btn-primary" id="start-btn" onclick="startMonitoring()"><span>▶</span> 开始监控</button>
            <button class="btn btn-danger" id="stop-btn" onclick="stopMonitoring()" disabled><span>⏹</span> 停止监控</button>
            <button class="btn btn-secondary" onclick="openDownloadsDir()"><span>📁</span> 下载目录</button>
          </div>
        </div>
        <div class="list-card">
          <div class="list-card-header"><span class="list-card-title">直播间列表</span><span class="list-count" id="room-list-count">0</span></div>
          <div id="room-list" class="room-list"></div>
          <div class="input-group"><input type="text" id="room-url-input" class="input-field" placeholder="输入直播间地址"><button class="btn btn-primary" onclick="addRoom()">添加房间</button></div>
        </div>
        <div class="log-container"><div class="log-header"><span class="log-title">实时日志</span><button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;" onclick="clearLogs()">清空</button></div><div id="log-content" class="log-content"></div></div>
      </div>
      <div id="page-settings" class="page">...</div>
      <div id="page-push" class="page">...</div>
      <div id="page-cookies" class="page">...</div>
    </div>
  </div>
  <script>
    const API_BASE = 'http://127.0.0.1:3847/api';
    let autoStartEnabled = false, autoMonitorEnabled = false;
    function showPage(p, el) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); el.classList.add('active'); if(p==='settings') loadSettings(); if(p==='push') loadPushSettings(); if(p==='cookies') loadCookies(); }
    function toggleSwitch(el) { el.classList.toggle('active'); }
    async function toggleAutoStart() { const el=document.getElementById('auto-start-switch'); autoStartEnabled=!autoStartEnabled; el.classList.toggle('active',autoStartEnabled); await fetch(API_BASE+'/settings/autoStart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:autoStartEnabled})}).catch(()=>{}); }
    async function toggleAutoMonitor() { const el=document.getElementById('auto-monitor-switch'); autoMonitorEnabled=!autoMonitorEnabled; el.classList.toggle('active',autoMonitorEnabled); await fetch(API_BASE+'/settings/autoMonitor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:autoMonitorEnabled})}).catch(()=>{}); }
    async function toggleMinimizeToTray() { const el=document.getElementById('minimize-to-tray-switch'); const en=el.classList.toggle('active'); if(window.electronAPI) window.electronAPI.setMinimizeToTray(en); await fetch(API_BASE+'/settings/minimizeToTray',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:en})}).catch(()=>{}); }
    function updateMonitorStatus(m) { const i=document.getElementById('monitor-indicator'),s=document.getElementById('monitor-status'),b=document.getElementById('start-btn'),e=document.getElementById('stop-btn'); if(m){ i.classList.remove('inactive'); i.classList.add('active'); s.textContent='监控中'; b.disabled=true; e.disabled=false; }else{ i.classList.remove('active'); i.classList.add('inactive'); s.textContent='未监控'; b.disabled=false; e.disabled=true; } }
    function addLog(t,m,type='') { const c=document.getElementById('log-content'),e=document.createElement('div'); e.className='log-entry'; e.innerHTML='<span class="log-timestamp">'+(t||new Date().toLocaleTimeString())+'</span><span class="log-message '+type+'">'+m+'</span>'; c.appendChild(e); c.scrollTop=c.scrollHeight; const ri=document.getElementById('record-indicator'),rs=document.getElementById('record-status'); if(m.includes('正在录制')||m.includes('录制中')){ ri.classList.remove('inactive'); ri.classList.add('active'); rs.textContent='录制中'; }else if(m.includes('停止录制')||m.includes('录制结束')||m.includes('录制完成')){ ri.classList.remove('active'); ri.classList.add('inactive'); rs.textContent='等待开播'; } }
    function clearLogs() { document.getElementById('log-content').innerHTML=''; fetch(API_BASE+'/logs/clear',{method:'POST'}); }
    async function selectSavePath() { try{ if(window.electronAPI&&window.electronAPI.selectDirectory){ const r=await window.electronAPI.selectDirectory(); if(r&&r.path) document.getElementById('setting-savepath').value=r.path; }else alert('目录选择功能仅在桌面应用中可用'); }catch(e){ console.error(e); } }
    async function startMonitoring() { const r=await(await fetch(API_BASE+'/monitor/start',{method:'POST'})).json(); if(r.error) alert(r.error); else updateMonitorStatus(true); }
    async function stopMonitoring() { const r=await(await fetch(API_BASE+'/monitor/stop',{method:'POST'})).json(); if(!r.error) updateMonitorStatus(false); }
    async function openDownloadsDir() { await fetch(API_BASE+'/downloads/open',{method:'POST'}); }
    async function openRoomDir(n) { await fetch(API_BASE+'/downloads/openRoom',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomName:decodeURIComponent(n)})}); }
    async function loadRooms() { try{ const rooms=await(await fetch(API_BASE+'/rooms')).json(); document.getElementById('room-count').textContent=rooms.length; document.getElementById('room-list-count').textContent=rooms.length; if(!rooms.length){ document.getElementById('room-list').innerHTML='<div class="empty-state"><div class="empty-state-icon">📺</div><p>暂无监控房间</p></div>'; return; } document.getElementById('room-list').innerHTML=rooms.map(r=>{ let dn=r.name||''; if(!dn&&r.url){ const m=r.url.match(/主播:([^，]+)/); if(m) dn=m[1].trim(); else try{ const p=new URL(r.url.split(',')[0]).pathname.split('/').filter(x=>x); if(p.length) dn=p[p.length-1]; }catch(e){} } dn=dn||'未命名'; return '<div class="room-item"><div class="room-status '+(r.disabled?'offline':'online')+'"></div><div class="room-info"><div class="room-name">'+dn+'</div><div class="room-url">'+r.url+'</div></div><div class="room-actions"><button class="icon-btn" onclick="openRoomDir(\''+encodeURIComponent(dn)+'\')" title="打开保存目录">📂</button><button class="icon-btn danger" onclick="deleteRoom('+r.id+')" title="删除">🗑</button></div></div>'; }).join(''); }catch(e){ console.error(e); } }
    async function addRoom() { const url=document.getElementById('room-url-input').value.trim(); if(!url){ alert('请输入房间地址'); return; } let name=''; const m=url.match(/主播:([^，]+)/); if(m) name=m[1].trim(); else try{ const p=new URL(url).pathname.split('/').filter(x=>x); if(p.length) name=p[p.length-1]; }catch(e){} await fetch(API_BASE+'/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url.replace(/主播:[^，]+[,，]\s*/g,''),name})}); document.getElementById('room-url-input').value=''; loadRooms(); }
    async function deleteRoom(id) { if(!confirm('确定删除?')) return; await fetch(API_BASE+'/rooms/'+id,{method:'DELETE'}); loadRooms(); }
    function parseConfig(c) { const o={}; c.split('\n').forEach(l=>{ if(l.includes('=')){ const[k,v]=l.split('=').map(s=>s.trim()); if(k&&v!==undefined) o[k]=v; } }); return o; }
    async function loadSettings() { try{ const d=await(await fetch(API_BASE+'/config')).json(); const c=parseConfig(d.content); document.getElementById('setting-language').value=c['language(zh_cn/en)']||'zh_cn'; document.getElementById('setting-format').value=c['视频保存格式ts|mkv|flv|mp4|mp3音频|m4a音频']||'ts'; document.getElementById('setting-quality').value=c['原画|超清|高清|标清|流畅']||'原画'; document.getElementById('setting-interval').value=c['循环时间(秒)']||'300'; document.getElementById('setting-savepath').value=c['直播保存路径(不填则默认)']||''; document.getElementById('setting-threshold').value=c['录制空间剩余阈值(gb)']||'1.0'; document.getElementById('setting-segment').value=c['视频分段时间(秒)']||'1800'; document.getElementById('setting-threads').value=c['同一时间访问网络的线程数']||'3'; ['author','time','title','titlefile','emoji'].forEach(x=>document.getElementById('setting-'+x).classList.toggle('active',true)); document.getElementById('setting-proxy').classList.toggle('active',c['是否使用代理ip(是/否)']==='是'); document.getElementById('setting-proxyaddr').value=c['代理地址']||''; document.getElementById('setting-segmented').classList.toggle('active',c['分段录制是否开启']==='是'); document.getElementById('setting-mp4convert').classList.toggle('active',c['录制完成后自动转为mp4格式']==='是'); }catch(e){ console.error(e); } }
    async function saveSettings() { await fetch(API_BASE+'/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:buildConfig()})}); alert('设置已保存！'); }
    function confirmRestoreDefaults() { if(confirm('⚠️ 警告：此操作将恢复所有设置到默认值，且无法撤销！\n\n确定要继续吗？')) { if(confirm('⚠️ 再次确认要恢复所有设置到默认值吗？')) restoreDefaults(); } }
    async function restoreDefaults() { const r=await(await fetch(API_BASE+'/settings/restoreDefaults',{method:'POST'})).json(); if(r.success){ alert('已成功恢复默认设置！'); document.getElementById('auto-monitor-switch').classList.remove('active'); document.getElementById('minimize-to-tray-switch').classList.remove('active'); if(window.electronAPI) window.electronAPI.setMinimizeToTray(false); }else alert('恢复失败: '+r.error); }
    function initSSE() { const es=new EventSource(API_BASE+'/logs/stream'); es.onmessage=e=>{ try{ const l=JSON.parse(e.data); let t=''; if(l.message.includes('成功')||l.message.includes('开始')) t='success'; if(l.message.includes('错误')||l.message.includes('失败')) t='error'; if(l.message.includes('警告')) t='warning'; addLog(l.timestamp,l.message,t); }catch(e){} }; es.onerror=()=>{ es.close(); setTimeout(initSSE,3000); }; }
    async function init() { try{ const s=await(await fetch(API_BASE+'/status')).json(); updateMonitorStatus(s.isMonitoring); (s.logs||[]).slice(-50).forEach(l=>{ if(typeof l==='string') addLog('',l); else addLog(l.timestamp,l.message); }); loadRooms(); initSSE(); const am=await(await fetch(API_BASE+'/settings/autoMonitor')).json(); autoMonitorEnabled=am.enabled; document.getElementById('auto-monitor-switch').classList.toggle('active',am.enabled); const mt=await(await fetch(API_BASE+'/settings/minimizeToTray')).json(); document.getElementById('minimize-to-tray-switch').classList.toggle('active',mt.enabled); if(window.electronAPI) window.electronAPI.setMinimizeToTray(mt.enabled); if(am.enabled) setTimeout(startMonitoring,2000); }catch(e){ addLog('','连接后端服务失败'); } }
    document.getElementById('room-url-input').addEventListener('keypress',e=>{ if(e.key==='Enter') addRoom(); });
    init();
  </script>
</body>
